<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AUL Hostel Hub | Payment Receipt</title>
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e8ecf1, #d4dce6);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        /* Receipt Container */
        .receipt-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Receipt Header */
        .receipt-header {
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }
        
        /* Logo Placeholder - RECTANGULAR */
        /* 🔴🔴🔴 PUT YOUR LOGO IMAGE URL IN THE src ATTRIBUTE BELOW 🔴🔴🔴 */
        .university-logo {
            width: auto;
            height: 70px;
            max-width: 280px;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .university-logo img {
            max-height: 70px;
            width: auto;
            object-fit: contain;
        }
        
        /* Fallback text logo if no image */
        .text-logo {
            display: none;
            text-align: center;
        }
        
        .text-logo h2 {
            color: white;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .text-logo p {
            color: #c4b5fd;
            font-size: 12px;
        }
        
        .receipt-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        
        .receipt-header p {
            color: #c4b5fd;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* Receipt Badge */
        .receipt-badge {
            display: inline-block;
            background: #d4af37;
            color: #0f0c29;
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        
        /* Receipt Body */
        .receipt-body {
            padding: 30px;
        }
        
        /* Title Section */
        .receipt-title {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #e2e8f0;
        }
        
        .receipt-title h2 {
            color: #1e293b;
            font-size: 24px;
            font-weight: 700;
        }
        
        .receipt-title p {
            color: #64748b;
            font-size: 13px;
            margin-top: 5px;
        }
        
        /* Student Info Section */
        .info-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .info-section h3 {
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        
        /* Transaction Details Section */
        .transaction-section {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .transaction-section h3 {
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .transaction-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .transaction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .transaction-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }
        
        .transaction-value {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
        }
        
        .transaction-value.amount {
            font-size: 20px;
            color: #10b981;
            font-weight: 800;
        }
        
        .transaction-value.paid {
            color: #10b981;
        }
        
        /* Payment Method Badge */
        .payment-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .payment-wallet {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .payment-flutterwave {
            background: #f3e8ff;
            color: #9333ea;
        }
        
        .payment-deposit {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .payment-withdrawal {
            background: #fed7aa;
            color: #ea580c;
        }
        
        /* QR Code Section */
        .qr-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 25px;
            text-align: center;
            flex-direction: column;
        }
        
        .qr-code {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .qr-section p {
            font-size: 11px;
            color: #64748b;
            margin-top: 12px;
        }
        
        /* Footer Section */
        .receipt-footer {
            background: #f8fafc;
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }
        
        .receipt-footer p {
            font-size: 11px;
            color: #64748b;
            margin: 5px 0;
        }
        
        .receipt-footer .generated {
            margin-top: 10px;
            font-size: 10px;
            color: #94a3b8;
        }
        
        /* Action Buttons */
        .action-buttons {
            max-width: 900px;
            margin: 20px auto 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
        }
        
        .btn-download {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-print {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }
        
        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-back {
            background: #64748b;
            color: white;
        }
        
        .btn-back:hover {
            background: #475569;
            transform: translateY(-2px);
        }
        
        /* Loading State */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }
        
        .error-container i {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 20px;
        }
        
        .error-container h2 {
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .error-container p {
            color: #64748b;
            margin-bottom: 20px;
        }
        
        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .action-buttons {
                display: none;
            }
            
            .receipt-container {
                box-shadow: none;
                border-radius: 0;
            }
            
            .receipt-header {
                background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .info-section, .qr-section {
                background: #f8fafc;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 16px;
            color: white;
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 20px 10px;
            }
            
            .receipt-header {
                padding: 20px;
            }
            
            .university-logo {
                height: 50px;
            }
            
            .university-logo img {
                max-height: 50px;
            }
            
            .receipt-body {
                padding: 20px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .transaction-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            
            .action-buttons {
                gap: 10px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <div class="spinner"></div>
            <p style="margin-top: 16px; color: #64748b;">Loading receipt...</p>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBiTikV1L3VCPWNjER6ZUwNIamObn6lwcw",
            authDomain: "aul-hotel-hub.firebaseapp.com",
            projectId: "aul-hotel-hub",
            storageBucket: "aul-hotel-hub.firebasestorage.app",
            messagingSenderId: "933016423665",
            appId: "1:933016423665:web:f79960301d2bc5d0fa2d50",
            databaseURL: "https://aul-hotel-hub-default-rtdb.firebaseio.com/"
        };
        
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? 'linear-gradient(135deg, #10b981, #059669)' : 'linear-gradient(135deg, #ef4444, #dc2626)';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn reverse 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
        
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(amount || 0);
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            return new Date(timestamp).toLocaleDateString('en-NG', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        function formatDateShort(timestamp) {
            if (!timestamp) return 'N/A';
            return new Date(timestamp).toLocaleDateString('en-NG', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric'
            });
        }
        
        function getPaymentBadgeClass(method) {
            if (method === 'Wallet' || method === 'wallet') return 'payment-wallet';
            if (method === 'Flutterwave' || method === 'flutterwave') return 'payment-flutterwave';
            if (method === 'Deposit') return 'payment-deposit';
            if (method === 'Withdrawal') return 'payment-withdrawal';
            return 'payment-wallet';
        }
        
        // ============================================
        // RECEIPT RENDERING
        // ============================================
        async function loadReceipt() {
            const urlParams = new URLSearchParams(window.location.search);
            const receiptId = urlParams.get('id') || urlParams.get('receipt');
            
            if (!receiptId) {
                showError('No receipt ID provided');
                return;
            }
            
            try {
                // Check if user is logged in
                const user = auth.currentUser;
                if (!user) {
                    showError('Please log in to view this receipt');
                    setTimeout(() => {
                        window.location.href = 'auth.html';
                    }, 3000);
                    return;
                }
                
                // Fetch receipt data
                const receiptSnap = await db.ref(`receipts/${receiptId}`).once('value');
                const receipt = receiptSnap.val();
                
                if (!receipt) {
                    showError('Receipt not found');
                    return;
                }
                
                // Verify ownership (if user is not admin, check if it's their receipt)
                const userSnap = await db.ref(`users/${user.uid}`).once('value');
                const userData = userSnap.val();
                const isAdmin = userData?.role === 'admin' || userData?.role === 'super_admin';
                
                if (!isAdmin && receipt.userId !== user.uid) {
                    showError('You do not have permission to view this receipt');
                    return;
                }
                
                // Fetch additional data based on receipt type
                let transactionType = receipt.type || 'Booking';
                let hallName = receipt.hallName || 'N/A';
                let bedType = receipt.bedType || 'N/A';
                let reference = receipt.reference || receipt.id || receiptId;
                
                // If it's a withdrawal, fetch withdrawal details
                if (receipt.type === 'Withdrawal') {
                    const withdrawSnap = await db.ref(`withdrawals/${receipt.reference}`).once('value');
                    const withdrawal = withdrawSnap.val();
                    if (withdrawal) {
                        reference = withdrawal.id || receipt.reference;
                    }
                }
                
                // Render the receipt
                renderReceipt({
                    ...receipt,
                    transactionType,
                    hallName,
                    bedType,
                    reference,
                    receiptId
                });
                
            } catch (error) {
                console.error('Error loading receipt:', error);
                showError('Failed to load receipt. Please try again.');
            }
        }
        
        function renderReceipt(data) {
            const fullName = [
                data.studentName || `${data.firstName || ''} ${data.surname || ''}`,
                data.middleName ? data.middleName : ''
            ].filter(Boolean).join(' ');
            
            const paymentMethodDisplay = data.method === 'Wallet' ? 'Wallet Balance' : 
                                         data.method === 'Flutterwave' ? 'Flutterwave (Card/Bank/USSD)' : 
                                         data.method || data.paymentMethod || 'N/A';
            
            const paymentBadgeClass = getPaymentBadgeClass(data.method);
            
            const html = `
                <div class="receipt-container" id="receiptContainer">
                    <!-- Header with Logo -->
                    <div class="receipt-header">
                        <!-- 🔴🔴🔴 LOGO PLACEHOLDER 🔴🔴🔴 -->
                        <!-- REPLACE THE src URL BELOW WITH YOUR ACTUAL LOGO IMAGE URL -->
                        <!-- THE LOGO SHOULD BE RECTANGULAR (e.g., 280x70px) -->
                        <div class="university-logo">
                            <img id="universityLogoImg" src="https://res-console.cloudinary.com/dsyr5ejvh/thumbnails/transform/v1/image/upload/Y19maWxsLGhfMjAwLHdfMjAw/v1/YW5jaG9yX2xvZ29feHR6NWZj/template_primary" alt="University Logo" onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block';">
                        </div>
                        <!-- Fallback text logo if image fails to load -->
                        <div id="fallbackLogo" class="text-logo" style="display: none;">
                            <h2>ANCHOR UNIVERSITY LAGOS</h2>
                            <p>AYOBO, LAGOS STATE, NIGERIA</p>
                        </div>
                        <!-- 🔴🔴🔴 END OF LOGO PLACEHOLDER 🔴🔴🔴 -->
                        
                        <h1>OFFICIAL RECEIPT</h1>
                        <p>Payment Confirmation Voucher</p>
                        <div class="receipt-badge">
                            <i class="fas fa-check-circle"></i> PAID
                        </div>
                    </div>
                    
                    <div class="receipt-body">
                        <!-- Title Section -->
                        <div class="receipt-title">
                            <h2>PAYMENT RECEIPT</h2>
                            <p>Transaction Reference: ${data.reference || data.receiptId}</p>
                        </div>
                        
                        <!-- Student Information -->
                        <div class="info-section">
                            <h3><i class="fas fa-user-graduate"></i> STUDENT INFORMATION</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">Full Name</span>
                                    <span class="info-value">${escapeHtml(fullName)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Matric Number</span>
                                    <span class="info-value">${escapeHtml(data.matric || 'N/A')}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Email Address</span>
                                    <span class="info-value">${escapeHtml(data.email || 'N/A')}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Transaction Date</span>
                                    <span class="info-value">${formatDate(data.date || data.createdAt || data.timestamp)}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Transaction Details -->
                        <div class="transaction-section">
                            <h3><i class="fas fa-receipt"></i> TRANSACTION DETAILS</h3>
                            <div class="transaction-details">
                                <div class="transaction-row">
                                    <span class="transaction-label">Purpose of Transaction</span>
                                    <span class="transaction-value">${data.transactionType || data.type || 'Accommodation Booking'}</span>
                                </div>
                                ${data.hallName && data.hallName !== 'N/A' ? `
                                <div class="transaction-row">
                                    <span class="transaction-label">Hall of Residence</span>
                                    <span class="transaction-value">${escapeHtml(data.hallName)}</span>
                                </div>
                                ` : ''}
                                ${data.bedType && data.bedType !== 'N/A' ? `
                                <div class="transaction-row">
                                    <span class="transaction-label">Bed Space Type</span>
                                    <span class="transaction-value">${escapeHtml(data.bedType)}</span>
                                </div>
                                ` : ''}
                                <div class="transaction-row">
                                    <span class="transaction-label">Payment Method</span>
                                    <span class="transaction-value">
                                        <span class="payment-badge ${paymentBadgeClass}">
                                            <i class="fas ${data.method === 'Wallet' ? 'fa-wallet' : data.method === 'Flutterwave' ? 'fa-credit-card' : 'fa-money-bill-wave'}"></i>
                                            ${paymentMethodDisplay}
                                        </span>
                                    </span>
                                </div>
                                <div class="transaction-row">
                                    <span class="transaction-label">Amount Paid</span>
                                    <span class="transaction-value amount">${formatCurrency(data.amount)}</span>
                                </div>
                                <div class="transaction-row">
                                    <span class="transaction-label">Transaction Status</span>
                                    <span class="transaction-value paid">
                                        <i class="fas fa-check-circle" style="color: #10b981;"></i> SUCCESSFUL
                                    </span>
                                </div>
                                <div class="transaction-row">
                                    <span class="transaction-label">Transaction Reference</span>
                                    <span class="transaction-value" style="font-family: monospace; font-size: 12px;">${data.reference || data.receiptId}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- QR Code Section -->
                        <div class="qr-section">
                            <div class="qr-code" id="qrcode"></div>
                            <p><i class="fas fa-qrcode"></i> Scan this QR code to verify receipt authenticity</p>
                            <p style="font-size: 10px; margin-top: 5px;">Verification URL: ${window.location.origin}/receipt-verify.html?ref=${data.receiptId}</p>
                        </div>
                    </div>
                    
                    <!-- Footer -->
                    <div class="receipt-footer">
                        <p><strong>Anchor University Hostel Hub</strong> - Official Payment Receipt</p>
                        <p>This is a computer-generated receipt and requires no signature.</p>
                        <p>For verification, scan the QR code or visit the university portal.</p>
                        <div class="generated">
                            <i class="fas fa-clock"></i> Generated on ${formatDate(new Date())} | Receipt ID: ${data.receiptId}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
            
            // Generate QR Code
            const verificationUrl = `${window.location.origin}/receipt-verify.html?ref=${data.receiptId}`;
            new QRCode(document.getElementById("qrcode"), {
                text: verificationUrl,
                width: 128,
                height: 128,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        function showError(message) {
            document.getElementById('app').innerHTML = `
                <div class="error-container">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>Receipt Not Found</h2>
                    <p>${message}</p>
                    <button onclick="window.location.href='student.html'" class="btn btn-back" style="margin-top: 20px;">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </button>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            if (!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // DOWNLOAD & PRINT FUNCTIONS
        // ============================================
        async function downloadPDF() {
            const element = document.getElementById('receiptContainer');
            if (!element) {
                showToast('Receipt not found', 'error');
                return;
            }
            
            showToast('Generating PDF...', 'success');
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `receipt_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            try {
                await html2pdf().set(opt).from(element).save();
                showToast('PDF downloaded successfully!', 'success');
            } catch (error) {
                console.error('PDF generation error:', error);
                showToast('Failed to generate PDF. Please try again.', 'error');
            }
        }
        
        function printReceipt() {
            const element = document.getElementById('receiptContainer');
            if (!element) {
                showToast('Receipt not found', 'error');
                return;
            }
            
            const originalTitle = document.title;
            document.title = 'Payment Receipt - AUL Hostel Hub';
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Payment Receipt - AUL Hostel Hub</title>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
                    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
                        @media print {
                            body { padding: 0; }
                            .no-print { display: none; }
                        }
                    </style>
                </head>
                <body>
                    ${element.outerHTML}
                    <div class="no-print" style="text-align: center; margin-top: 20px;">
                        <button onclick="window.print()" style="padding: 10px 20px; margin: 5px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">
                            <i class="fas fa-print"></i> Print
                        </button>
                        <button onclick="window.close()" style="padding: 10px 20px; margin: 5px; background: #64748b; color: white; border: none; border-radius: 8px; cursor: pointer;">
                            <i class="fas fa-times"></i> Close
                        </button>
                    </div>
                    <script>
                        window.onload = function() {
                            setTimeout(() => {
                                window.print();
                            }, 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
            
            document.title = originalTitle;
            showToast('Print dialog opened', 'success');
        }
        
        // ============================================
        // AUTH STATE LISTENER
        // ============================================
        auth.onAuthStateChanged((user) => {
            if (!user) {
                showError('Please log in to view receipts');
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 3000);
                return;
            }
            loadReceipt();
        });
        
        // Make functions globally available for buttons
        window.downloadPDF = downloadPDF;
        window.printReceipt = printReceipt;
    </script>
    
    <!-- Action Buttons - Added after container loads -->
    <div class="action-buttons" id="actionButtons" style="display: none;">
        <button class="btn btn-download" onclick="downloadPDF()">
            <i class="fas fa-download"></i> Download PDF
        </button>
        <button class="btn btn-print" onclick="printReceipt()">
            <i class="fas fa-print"></i> Print Receipt
        </button>
        <button class="btn btn-back" onclick="window.location.href='student.html'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
    </div>
    
    <script>
        // Show action buttons after receipt is rendered
        const observer = new MutationObserver(function(mutations) {
            const container = document.getElementById('receiptContainer');
            if (container) {
                document.getElementById('actionButtons').style.display = 'flex';
                observer.disconnect();
            }
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
    </script>
</body>
</html>
